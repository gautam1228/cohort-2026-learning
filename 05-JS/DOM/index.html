<body>
    <button id="clickbtn">
        Click me
    </button>
    <script>
        // console.log(window.document); // This is the DOM
        const buttonRef = window.document.getElementById("clickbtn");
        buttonRef.addEventListener("click", () => {
            console.log("Button was clicked.");
        });
        buttonRef.removeEventListener("click");
        // buttonRef.remove();
        buttonRef = null; // Freeing the memory (GC will rmeove it from memory as it points to null)
        // Adding this improves the performance
        
    </script>
